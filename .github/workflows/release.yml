name: Release

on:
  release:
    types: [published]

jobs:
  call-build-workflow:
    uses: ./.github/workflows/build.yml

  release:
    runs-on: ubuntu-24.04
    needs: call-build-workflow
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download APE (x86_64 Linux/FreeBSD) artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.call-build-workflow.outputs.ape_artifact_name }}
          path: dist/ape

      - name: Download macOS arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.call-build-workflow.outputs.arm_artifact_name }}
          path: dist/arm

      - name: Stage release assets with platform-specific names
        run: |
          set -e
          mkdir -p release-assets
          # APE build keeps the canonical name documented in the README.
          cp dist/ape/sanoid-portable release-assets/sanoid-portable
          # ARM build gets a platform-specific suffix so users can pick
          # the right asset and so it doesn't collide with the APE one.
          cp dist/arm/sanoid-portable release-assets/sanoid-portable-darwin-arm64
          chmod +x release-assets/sanoid-portable release-assets/sanoid-portable-darwin-arm64
          ls -la release-assets

      - name: Assert Changelog updated for release version
        run: |
          version='${{ github.event.release.tag_name }}'
          version_heading="## $version"

          if ! grep -q "$version_heading" CHANGELOG.md; then
            echo "Error: CHANGELOG.md does not appear to contain release notes for \"$version\". A heading matching \"$version_heading\" was not found."
            exit 1
          fi

          echo "Ok: CHANGELOG.md contains release notes for \"$version\"."

      - name: Assert sanoid-portable APE version matches GitHub Release version
        run: |
          sudo apt install -y binfmt-support
          sudo update-binfmts --install APE /bin/sh --magic MZqFpD

          sanoid_version=$(./release-assets/sanoid-portable --version)
          release_version="${{ github.event.release.tag_name }}"

          echo "GitHub Release: $release_version"
          echo "sanoid-portable (APE): $sanoid_version"

          if [ "$release_version" != "$sanoid_version" ]; then
            echo "Error: GitHub Release version \"$release_version\" does not match sanoid-portable version \"$sanoid_version\"."
            exit 1
          fi

          echo 'Ok: sanoid-portable APE version matches GitHub release version.'
          sha256sum release-assets/sanoid-portable
          sha256sum release-assets/sanoid-portable-darwin-arm64

      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            release-assets/sanoid-portable
            release-assets/sanoid-portable-darwin-arm64

      - name: Upload sanoid-portable assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/sanoid-portable
            release-assets/sanoid-portable-darwin-arm64
          tag_name: ${{ github.event.release.tag_name }}
          fail_on_unmatched_files: true
