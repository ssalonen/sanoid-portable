name: Build

on:
  pull_request:
  push:
  workflow_call:
    outputs:
      artifact_name:
        description: Name of the sanoid-portable artifact uploaded during the build.
        value: ${{ jobs.build.outputs.artifact_name }}
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    outputs:
      artifact_name: ${{ steps.set_artifact_name.outputs.artifact_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize build environment
        run: ./init.sh

      - name: Build sanoid-portable binary
        run: |
          # Build on Ubuntu

          set -e

          # Add a new binfmt entry that matches APE's (Actually Portable Executable)'s
          # magic number to avoid execution by Ubuntu's built-in "MZ" binfmt
          # interpreter which "helpfully" tries to run the binary with Wine.
          sudo apt install -y binfmt-support
          sudo update-binfmts --install APE /bin/sh --magic MZqFpD

          ./build.sh

      - name: Set artifact name
        id: set_artifact_name
        run: echo "artifact_name=sanoid-portable.${{ github.sha }}.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Upload built sanoid-portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.set_artifact_name.outputs.artifact_name }}
          path: output/sanoid-portable
          if-no-files-found: error
          retention-days: 1

  build-arm:
    runs-on: macos-latest
    outputs:
      artifact_name: ${{ steps.set_artifact_name.outputs.artifact_name }}
    env:
      PERL_MM_USE_DEFAULT: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Homebrew perl and cpanminus
        run: |
          brew install perl cpanminus
          # Put Homebrew perl ahead of /usr/bin/perl so every later step
          # (cpanm, pp, the pp shebang lookup) resolves to the same perl.
          echo "$(brew --prefix perl)/bin" >> "$GITHUB_PATH"

      - name: Show perl toolchain (sanity check)
        run: |
          echo "PATH=$PATH"
          echo "perl     -> $(command -v perl)"
          perl -e 'printf "perl version %vd at %s\n", $^V, $^X'
          echo "cpanm    -> $(command -v cpanm)"
          head -1 "$(command -v cpanm)"

      - name: Install Perl modules into a clean prefix
        run: |
          set -e
          # Wipe any stale per-version directories left from a previous run
          # so we never end up with PAR::Packer XS for the wrong perl.
          rm -rf "$HOME/perl5"
          cpanm --local-lib="$HOME/perl5" --notest \
            Config::IniFiles Capture::Tiny PAR::Packer
          # Expose the local prefix to all later steps without depending on
          # local::lib being importable (cpanm bundles it but doesn't install
          # it into --local-lib= unless asked).
          echo "$HOME/perl5/bin" >> "$GITHUB_PATH"
          echo "PERL5LIB=$HOME/perl5/lib/perl5" >> "$GITHUB_ENV"

      - name: Build ARM binary with PAR::Packer
        run: |
          set -e

          echo "perl     -> $(command -v perl)"
          perl -e 'printf "perl version %vd at %s\n", $^V, $^X'
          echo "pp       -> $(command -v pp)"
          head -1 "$(command -v pp)"

          # Sanity check: pp must be the one we just installed, not the
          # /usr/bin/pp that ships on the runner image.
          case "$(command -v pp)" in
            "$HOME/perl5/bin/pp") ;;
            *)
              echo "ERROR: pp resolved outside \$HOME/perl5/bin -- PATH is wrong" >&2
              exit 1
              ;;
          esac

          if [ -d sanoid_source ]; then
            rm -rf sanoid_source
          fi
          git clone --depth 1 https://github.com/jimsalterjrs/sanoid.git sanoid_source

          mkdir -p output
          cd sanoid_source
          # Invoke pp through the explicit perl interpreter so a stray
          # shebang can't redirect us to /usr/bin/perl.
          perl "$HOME/perl5/bin/pp" -o ../output/sanoid-portable sanoid

      - name: Set artifact name
        id: set_artifact_name
        run: echo "artifact_name=sanoid-portable.arm.${{ github.sha }}.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Upload built sanoid-portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.set_artifact_name.outputs.artifact_name }}
          path: output
          if-no-files-found: error
          retention-days: 1

  test-arm:
    needs: build-arm
    if: always() && needs.build-arm.result == 'success'
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download sanoid-portable artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-arm.outputs.artifact_name }}

      - name: Test on macOS
        run: |
          echo "=== Listing files ==="
          ls -la

          if [ -f sanoid-portable ]; then
            echo "=== Testing sanoid-portable binary ==="
            chmod +x sanoid-portable
            ./sanoid-portable --help
            ./sanoid-portable --version
          elif [ -f sanoid ]; then
            echo "=== Testing sanoid scripts ==="
            chmod +x sanoid syncoid findoid
            ./sanoid --help
            ./syncoid --help
            ./findoid --help
          else
            echo "Error: No sanoid-portable or sanoid found"
            exit 1
          fi

  test:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download sanoid-portable artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}

      - name: Test on Ubuntu
        run: |
          # Test on Ubuntu

          set -e

          # Test the assimiate workaround here
          sudo chmod +x sanoid-portable
          sh ./sanoid-portable --assimilate

          ./test-smoke.sh

      - name: Test in FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install -y bash jq wget
          run: |
            set -e

            echo 'Begin smoke tests...'
            ./test-smoke.sh
            echo 'Completed smoke tests.'

            echo ''

            echo 'Begin integration tests...'
            ./test-integration.sh
            echo 'Completed integration tests.'
